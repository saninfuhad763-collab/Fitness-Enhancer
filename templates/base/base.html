{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{% block title %}Fitness Enhancer{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <nav class="navbar navbar-expand-lg ds-navbar">
    <div class="container">
      <a class="navbar-brand ds-h5" href="{% url 'dashboard' %}">
        Fitness Enhancer
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'workout_plan' %}">Workout</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'calorie_calculator' %}">Diet</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'progress' %}">Progress</a>
          </li>
          <li class="nav-item ms-lg-3">
            <form method="post" action="{% url 'logout' %}" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="ds-btn ds-btn-sm ds-btn-outline">
                Logout
              </button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>


  <div class="container py-5">
    {% if messages %}
      {% for message in messages %}
        <div class="ds-alert ds-alert-{{ message.tags|default:'info' }} mb-4 d-flex align-items-center">
          <i data-lucide="check-circle" class="me-2" style="width: 20px; height: 20px;"></i>
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>

</html>
