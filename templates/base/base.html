<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fitness Enhancer{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#111827">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/users/dashboard/">
      Fitness Enhancer
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
      data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" href="/users/dashboard/">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/workout/">Workout</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/tools/calories/">Diet</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/progress/">Progress</a>
        </li>
        <li class="nav-item ms-lg-3">
          <a class="btn btn-sm btn-outline-light" href="/users/logout/">
            Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<div class="container py-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
